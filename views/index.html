<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Jacob Simmons — Photography</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand">Jacob Simmons</a>
      <nav class="menu" id="menu">
        <div class="hr-space"></div>
        <!-- Projects will be loaded dynamically -->
        <div class="hr-space"></div>
        <a href="/bibliography.html">Bibliography and contact</a>
      </nav>
    </aside>
    <main class="content">
      <div class="stage">
        <img src="/uploads/homepage.jpg" alt="Homepage Image" class="main-image">
      </div>
    </main>
  </div>
  <script>
    // Load dynamic menu
    async function loadMenu() {
      try {
        const response = await fetch('/api/projects');
        const projects = await response.json();
        const menu = document.getElementById('menu');
        const hrSpace = menu.querySelector('.hr-space');
        
        // Remove any existing project links
        const existingProjects = menu.querySelectorAll('.project-link');
        existingProjects.forEach(link => link.remove());
        
        // Create a document fragment to batch DOM updates
        const fragment = document.createDocumentFragment();
        
        // Add project links to fragment
        projects.forEach(project => {
          const link = document.createElement('a');
          link.href = `/project.html?id=${project.id}`;
          link.textContent = project.name;
          link.className = 'project-link';
          fragment.appendChild(link);
        });
        
        // Insert all project links at once after the first hr-space
        hrSpace.parentNode.insertBefore(fragment, hrSpace.nextSibling);
      } catch (error) {
        console.error('Failed to load menu:', error);
      }
    }
    
    // Load menu on page load
    loadMenu();
  </script>
</body>
</html>

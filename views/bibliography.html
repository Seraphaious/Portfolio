<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bibliography & Contact — Jacob Simmons</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand">Jacob Simmons</a>
      <nav class="menu" id="menu">
        <div class="hr-space"></div>
        <!-- Projects will be loaded dynamically -->
        <div class="hr-space"></div>
        <a href="/bibliography.html">Bibliography and contact</a>
      </nav>
    </aside>
    <main class="content">
      <div class="stage" style="display:block; padding:24px; overflow:auto;">
        <h1 style="font-family: Helvetica, Arial, sans-serif; font-weight:700; font-size:18px; margin-top:0;">Bibliography</h1>
        <ul>
          <li>[Reference 1]</li>
          <li>[Reference 2]</li>
          <li>[Reference 3]</li>
        </ul>
        <div class="hr-space"></div>
        <h2 style="font-family: Helvetica, Arial, sans-serif; font-weight:700; font-size:16px;">Contact</h2>
        <p>Email: [Your email here]</p>
        <p>Instagram: [Your Instagram handle here]</p>
      </div>
    </main>
  </div>
  <script>
    // Load dynamic menu
    async function loadMenu() {
      try {
        const menu = document.getElementById('menu');
        const hrSpace = menu.querySelector('.hr-space');
        
        // Hide menu temporarily to prevent flickering
        menu.style.visibility = 'hidden';
        
        // Remove any existing project links
        const existingProjects = menu.querySelectorAll('.project-link');
        existingProjects.forEach(link => link.remove());
        
        const response = await fetch('/api/projects');
        const projects = await response.json();
        
        // Add project links after the first hr-space
        projects.forEach(project => {
          const link = document.createElement('a');
          link.href = `/project.html?id=${project.id}`;
          link.textContent = project.name;
          link.className = 'project-link';
          hrSpace.parentNode.insertBefore(link, hrSpace.nextSibling);
        });
        
        // Show menu after loading
        menu.style.visibility = 'visible';
      } catch (error) {
        console.error('Failed to load menu:', error);
        // Show menu even if loading failed
        const menu = document.getElementById('menu');
        menu.style.visibility = 'visible';
      }
    }
    
    // Load menu on page load
    loadMenu();
  </script>
</body>
</html>

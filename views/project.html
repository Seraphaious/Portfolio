<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Project — Jacob Simmons</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand">Jacob Simmons</a>
      <nav class="menu" id="menu">
        <div class="hr-space"></div>
        <!-- Projects will be loaded dynamically -->
        <div class="hr-space"></div>
        <a href="/bibliography.html">Bibliography and contact</a>
      </nav>
    </aside>
    <main class="content">
      <div class="stage" id="stage">
        <img id="mainImage" alt="Project image" style="display:none;"/>
        <video id="mainVideo" style="display:none; max-width:100%; max-height:100%; object-fit:contain;"></video>
        <div class="nav-zones" id="navZones" style="display:none;">
          <div class="nav-zone" id="prevZone" title="Previous"></div>
          <div class="nav-zone" id="nextZone" title="Next"></div>
        </div>
      </div>
      <div class="thumb-grid" id="thumbGrid"></div>
    </main>
  </div>
  <div class="controls">
    <a href="#" id="prevBtn">Previous / </a>
    <a href="#" id="nextBtn">Next</a>
    <span id="pager">(0 of 0)</span>
    <a href="#" id="toggleThumbs">Display thumbnails</a>
  </div>
  <script>
  (function(){
    const params = new URLSearchParams(location.search);
    const id = params.get("id") || "project-1";

    const mainImage = document.getElementById("mainImage");
    const mainVideo = document.getElementById("mainVideo");
    const pager = document.getElementById("pager");
    const toggle = document.getElementById("toggleThumbs");
    const grid = document.getElementById("thumbGrid");
    const navZones = document.getElementById("navZones");
    const prevZone = document.getElementById("prevZone");
    const nextZone = document.getElementById("nextZone");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let images = [];
    let index = 0;
    let thumbsVisible = false;

    function isVideo(filename) {
      const ext = filename.toLowerCase().split('.').pop();
      return ['mp4', 'webm', 'mov', 'avi'].includes(ext);
    }

    function generateVideoThumbnail(videoSrc) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        video.style.display = 'none';
        video.muted = true;
        video.preload = 'metadata';
        video.playsInline = true;
        video.crossOrigin = 'anonymous';
        
        document.body.appendChild(video);
        
        video.addEventListener('loadedmetadata', () => {
          // Seek to 1 second or 10% of duration, whichever is smaller
          const seekTime = Math.min(1, video.duration * 0.1);
          video.currentTime = seekTime;
        });
        
        video.addEventListener('seeked', () => {
          try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataURL = canvas.toDataURL('image/jpeg', 0.8);
            document.body.removeChild(video);
            resolve(dataURL);
          } catch (error) {
            document.body.removeChild(video);
            reject(error);
          }
        });
        
        video.addEventListener('error', (e) => {
          document.body.removeChild(video);
          reject(e);
        });
        
        video.src = videoSrc;
      });
    }

    function updatePager(){
      pager.textContent = `(${images.length ? index+1 : 0} of ${images.length})`;
    }
    function showImage(i){
      if (!images.length) return;
      
      // Stop any currently playing video immediately
      if (!mainVideo.paused) {
        mainVideo.pause();
      }
      mainVideo.currentTime = 0;
      mainVideo.src = "";
      
      index = (i + images.length) % images.length;
      const currentFile = images[index];
      const currentIsVideo = isVideo(currentFile);
      
      if (currentIsVideo) {
        mainImage.style.display = "none";
        mainVideo.style.display = "block";
        mainVideo.src = "/" + currentFile;
        mainVideo.autoplay = true;
        mainVideo.muted = false;
        mainVideo.loop = true;
        mainVideo.playsInline = true;
        mainVideo.controls = false;
        mainVideo.load(); // Reload the video element
      } else {
        mainVideo.style.display = "none";
        mainImage.style.display = "block";
        mainImage.src = "/" + currentFile;
        mainImage.alt = currentFile;
      }
      updatePager();
    }
    async function renderThumbs(){
      grid.innerHTML = "";
      
      for (let i = 0; i < images.length; i++) {
        const im = images[i];
        const isVideoFile = isVideo(im);
        let el;
        
        if (isVideoFile) {
          try {
            // Generate thumbnail from video using canvas
            const thumbnailDataURL = await generateVideoThumbnail("/" + im);
            
            el = document.createElement("img");
            el.src = thumbnailDataURL;
            el.alt = im;
            el.style.width = "100%";
            el.style.height = "120px";
            el.style.objectFit = "cover";
            el.style.cursor = "pointer";
            
            // Add a play icon overlay to indicate it's a video
            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";
            wrapper.style.display = "inline-block";
            wrapper.style.width = "100%";
            wrapper.appendChild(el);
            
            const playIcon = document.createElement("div");
            playIcon.innerHTML = "▶";
            playIcon.style.position = "absolute";
            playIcon.style.top = "50%";
            playIcon.style.left = "50%";
            playIcon.style.transform = "translate(-50%, -50%)";
            playIcon.style.background = "rgba(0,0,0,0.7)";
            playIcon.style.color = "white";
            playIcon.style.borderRadius = "50%";
            playIcon.style.width = "30px";
            playIcon.style.height = "30px";
            playIcon.style.display = "flex";
            playIcon.style.alignItems = "center";
            playIcon.style.justifyContent = "center";
            playIcon.style.fontSize = "12px";
            playIcon.style.pointerEvents = "none";
            wrapper.appendChild(playIcon);
            
            wrapper.addEventListener("click", (e)=>{
              e.preventDefault();
              thumbsVisible = false;
              grid.style.display = "none";
              document.getElementById("stage").style.display = "flex";
              navZones.style.display = images.length > 1 ? "grid" : "none";
              showImage(i);
              toggle.textContent = "Display thumbnails";
            });
            grid.appendChild(wrapper);
          } catch (error) {
            console.error('Failed to generate video thumbnail:', error);
            // Fallback to original video element approach if canvas fails
            el = document.createElement("video");
            el.src = "/" + im;
            el.muted = true;
            el.preload = "metadata";
            el.controls = false;
            el.autoplay = false;
            el.playsInline = true;
            el.style.width = "100%";
            el.style.height = "120px";
            el.style.objectFit = "cover";
            el.style.cursor = "pointer";
            
            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";
            wrapper.style.display = "inline-block";
            wrapper.style.width = "100%";
            wrapper.appendChild(el);
            
            const playIcon = document.createElement("div");
            playIcon.innerHTML = "▶";
            playIcon.style.position = "absolute";
            playIcon.style.top = "50%";
            playIcon.style.left = "50%";
            playIcon.style.transform = "translate(-50%, -50%)";
            playIcon.style.background = "rgba(0,0,0,0.7)";
            playIcon.style.color = "white";
            playIcon.style.borderRadius = "50%";
            playIcon.style.width = "30px";
            playIcon.style.height = "30px";
            playIcon.style.display = "flex";
            playIcon.style.alignItems = "center";
            playIcon.style.justifyContent = "center";
            playIcon.style.fontSize = "12px";
            playIcon.style.pointerEvents = "none";
            wrapper.appendChild(playIcon);
            
            wrapper.addEventListener("click", (e)=>{
              e.preventDefault();
              thumbsVisible = false;
              grid.style.display = "none";
              document.getElementById("stage").style.display = "flex";
              navZones.style.display = images.length > 1 ? "grid" : "none";
              showImage(i);
              toggle.textContent = "Display thumbnails";
            });
            grid.appendChild(wrapper);
          }
        } else {
          el = document.createElement("img");
          el.src = "/" + im;
          el.alt = im;
          el.addEventListener("click", (e)=>{
            e.preventDefault();
            thumbsVisible = false;
            grid.style.display = "none";
            document.getElementById("stage").style.display = "flex";
            navZones.style.display = images.length > 1 ? "grid" : "none";
            showImage(i);
            toggle.textContent = "Display thumbnails";
          });
          grid.appendChild(el);
        }
      }
    }
    async function toggleThumbnails(e){
      e.preventDefault();
      thumbsVisible = !thumbsVisible;
      if (thumbsVisible){
        await renderThumbs();
        grid.style.display = "grid";
        document.getElementById("stage").style.display = "none";
        navZones.style.display = "none";
        toggle.textContent = "Hide thumbnails";
      } else {
        grid.style.display = "none";
        document.getElementById("stage").style.display = "flex";
        navZones.style.display = images.length > 1 ? "grid" : "none";
        toggle.textContent = "Display thumbnails";
      }
    }

    toggle.addEventListener("click", toggleThumbnails);
    prevZone.addEventListener("click", ()=> showImage(index - 1));
    nextZone.addEventListener("click", ()=> showImage(index + 1));
    prevBtn.addEventListener("click", (e)=>{ e.preventDefault(); showImage(index - 1); });
    nextBtn.addEventListener("click", (e)=>{ e.preventDefault(); showImage(index + 1); });

    fetch(`/api/project/${encodeURIComponent(id)}`)
      .then(r=>r.json())
      .then(data => {
        images = data.images || [];
        if (!images.length){
          mainImage.alt = "No images yet. Use /admin to add some.";
          navZones.style.display = "none";
          updatePager();
          return;
        }
        navZones.style.display = images.length > 1 ? "grid" : "none";
        showImage(0);
      });
  })();
  
  // Load dynamic menu
  async function loadMenu() {
    try {
      const response = await fetch('/api/projects');
      const projects = await response.json();
      const menu = document.getElementById('menu');
      const hrSpace = menu.querySelector('.hr-space');
      
      // Remove any existing project links
      const existingProjects = menu.querySelectorAll('.project-link');
      existingProjects.forEach(link => link.remove());
      
      // Add project links after the first hr-space
      projects.forEach(project => {
        const link = document.createElement('a');
        link.href = `/project.html?id=${project.id}`;
        link.textContent = project.name;
        link.className = 'project-link';
        hrSpace.parentNode.insertBefore(link, hrSpace.nextSibling);
      });
    } catch (error) {
      console.error('Failed to load menu:', error);
    }
  }
  
  // Load menu on page load
  loadMenu();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <div style="max-width:420px; margin:80px auto; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:12px;">
    <h1 style="font-family: Helvetica, Arial, sans-serif; font-weight:700;">Admin Login</h1>
    <form id="loginForm">
      <div style="margin:8px 0;">
        <input type="text" id="username" placeholder="Username" style="width:100%; padding:8px; border:1px solid #ddd;"/>
      </div>
      <div style="margin:8px 0;">
        <input type="password" id="password" placeholder="Password" style="width:100%; padding:8px; border:1px solid #ddd;"/>
      </div>
      <button type="submit" style="padding:6px 10px; border:1px solid #333; background:#fff; border-radius:6px; cursor:pointer;">Login</button>
    </form>
    <div id="msg" style="margin-top:8px; color:#c00;"></div>
  </div>
  <script>
  document.getElementById("loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) { location.href = "/admin/dashboard.html"; }
    else {
      const j = await res.json().catch(()=>({error:"Login failed"}));
      document.getElementById("msg").textContent = j.error || "Login failed";
    }
  });
  </script>
</body>
</html>
